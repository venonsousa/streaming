<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Web Rádio Profissional</title>

<style>
body{
  margin:0;
  font-family:Arial;
  background:#000;
  color:#fff;
}

/* PLAYER */
.player{
  position:fixed;
  top:0;
  width:100%;
  background:#0d2b4f;
  display:flex;
  justify-content:space-between;
  align-items:center;
  padding:10px;
  z-index:999;
}

.player button{
  background:#1e90ff;
  border:none;
  color:#fff;
  padding:8px 15px;
  border-radius:5px;
  cursor:pointer;
}

.live{color:red;font-weight:bold;}
.spacer{height:70px;}

/* PLANOS */
.topo{
  text-align:center;
  padding:3rem;
  background:linear-gradient(135deg,#0d2b4f,#1e3f6f);
}

.plans-grid{
  display:grid;
  grid-template-columns:repeat(auto-fit,minmax(250px,1fr));
  gap:2rem;
  padding:2rem;
}

.plan-card{
  background:rgba(255,255,255,0.1);
  padding:2rem;
  border-radius:10px;
  text-align:center;
}

.price-btn{
  background:#1e90ff;
  padding:10px;
  display:inline-block;
  margin-top:10px;
  border-radius:8px;
  color:#fff;
  text-decoration:none;
}

/* XAT */
.section{
  padding:40px;
  text-align:center;
}

.power-card{
  display:inline-block;
  margin:10px;
  padding:15px;
  background:rgba(255,255,255,0.1);
  border-radius:10px;
  width:120px;
}

.power-card img{
  width:60px;
}
</style>
</head>

<body>

<!-- PLAYER -->
<div class="player">
  <button onclick="toggleRadio()">▶️ Play</button>
  <div>
    <div id="status">Carregando...</div>
    <div id="musica">---</div>
  </div>
</div>

<div class="spacer"></div>

<!-- TOPO -->
<div class="topo">
  <h1>🎧 Web Rádio</h1>
  <p>Sua rádio online profissional</p>
</div>

<!-- PLANOS -->
<section class="plans-grid">
  <div class="plan-card">
    <h2>Plano Iniciante</h2>
    <p>250 ouvintes<br>3GB AutoDJ</p>
    <a href="#" class="price-btn">R$ 50</a>
  </div>

  <div class="plan-card">
    <h2>Plano Super</h2>
    <p>500 ouvintes<br>App + Player + Xat</p>
    <a href="#" class="price-btn">R$ 100</a>
  </div>

  <div class="plan-card">
    <h2>Plano Ouro</h2>
    <p>Site + Rádio + App</p>
    <a href="#" class="price-btn">R$ 150</a>
  </div>
</section>

<!-- POWERS -->
<div class="section">
  <h2>🔥 Últimos Powers</h2>
  <div id="xatPowers">Carregando...</div>
</div>

<!-- PROMOT -->
<div class="section">
  <h2>💬 Xats em Destaque (BR)</h2>
  <div id="xatPromot">Carregando...</div>
</div>

<script>
let audio = new Audio("https://stm.igng.com.br:7018/stream");
let tocando=false;

function toggleRadio(){
  if(!tocando){
    audio.play();
    tocando=true;
    event.target.innerText="⏸️ Pause";
  }else{
    audio.pause();
    tocando=false;
    event.target.innerText="▶️ Play";
  }
}

/* RADIO */
async function atualizarRadio(){
  try{
    let r=await fetch("https://stm.igng.com.br:7018/status-json.xsl");
    let d=await r.json();
    let s=d.icestats.source;

    let t=s.title||"";
    let server=s.server_name||"";

    let isLive = (
      server.toLowerCase().includes("live") ||
      t.toLowerCase().includes("ao vivo") ||
      !t.includes(" - ")
    );

    if(t.includes(" - ")){
      let [a,m]=t.split(" - ");
      document.getElementById("musica").innerHTML=`<b>${a}</b> - ${m}`;
    }else{
      document.getElementById("musica").innerText=t;
    }

    if(isLive){
      document.getElementById("status").innerHTML="🔴 AO VIVO";
      document.getElementById("status").className="live";
    }else{
      document.getElementById("status").innerHTML="🎵 AutoDJ";
      document.getElementById("status").className="";
    }

  }catch{
    document.getElementById("status").innerText="Offline";
  }
}

setInterval(atualizarRadio,5000);
atualizarRadio();

/* XAT LATEST (NOVO) */
async function carregarPowers(){
  try{
    let res=await fetch("https://api.xatblog.net/latest");
    let data=await res.json();

    let box=document.getElementById("xatPowers");
    box.innerHTML="";

    data.slice(0,6).forEach(p=>{
      let div=document.createElement("div");
      div.className="power-card";

      div.innerHTML=`
        <div>🔥 ${p.name}</div>
        ${p.image?`<img src="${p.image}">`:""}
      `;

      box.appendChild(div);
    });

  }catch{
    document.getElementById("xatPowers").innerText="Erro ao carregar";
  }
}

setInterval(carregarPowers,20000);
carregarPowers();

/* XAT PROMOT */
async function carregarPromot(){
  try{
    let r=await fetch("https://xat.com/json/promoted.php");
    let d=await r.json();

    let box=document.getElementById("xatPromot");
    box.innerHTML="";

    d.forEach(c=>{
      if(c.name.toLowerCase().includes("br")){
        let div=document.createElement("div");
        div.innerText="💬 "+c.name;
        box.appendChild(div);
      }
    });

  }catch{
    document.getElementById("xatPromot").innerText="Erro";
  }
}

setInterval(carregarPromot,20000);
carregarPromot();
</script>

</body>
</html>
