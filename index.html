<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Rádio Sertaneja Premium</title>

<style>
body{
  margin:0;
  font-family:Arial;
  color:#fff;
  background: url('https://xatimg.com/image/LID6lYza9A0b.png') no-repeat center center fixed;
  background-size: cover;
}

/* CANVAS MAIS VISÍVEL */
#bgCanvas{
  position:fixed;
  top:0;
  left:0;
  width:100%;
  height:100%;
  z-index:1;
  pointer-events:none;
}

/* overlay mais leve */
body::after{
  content:"";
  position:fixed;
  top:0;
  left:0;
  width:100%;
  height:100%;
  background:rgba(0,0,0,0.4);
  z-index:2;
}

/* CONTEÚDO ACIMA */
.player, .topo, .plans, .streaming-box, nav{
  position:relative;
  z-index:3;
}

/* MENU */
nav{
  position:fixed;
  top:0;
  width:100%;
  display:flex;
  justify-content:center;
  gap:2rem;
  padding:10px;
  background:rgba(0,0,0,0.6);
  backdrop-filter:blur(10px);
}

nav a{
  color:#fff;
  text-decoration:none;
  font-weight:bold;
  transition:0.3s;
}

nav a:hover{
  color:#ffcc00;
}

/* PLAYER */
.player{
  position:fixed;
  top:50px;
  width:100%;
  background:linear-gradient(90deg,#8B4513,#d2691e);
  display:flex;
  align-items:center;
  justify-content:space-between;
  padding:10px;
}

.player img{
  width:60px;
  height:60px;
  border-radius:10px;
}

.spacer{height:120px;}

.topo{
  text-align:center;
  padding:4rem 1rem;
}

/* PLANOS */
.plans{
  display:grid;
  grid-template-columns:repeat(auto-fit,minmax(250px,1fr));
  gap:2rem;
  padding:2rem;
}

.plan-card{
  background:rgba(0,0,0,0.6);
  padding:2rem;
  border-radius:15px;
  text-align:center;
}

.btn{
  display:inline-block;
  margin-top:1rem;
  padding:10px;
  background:#ffcc00;
  color:#000;
  border-radius:10px;
}

/* STREAM BOX LIMPO */
.streaming-box{
  padding:3rem;
  text-align:center;
}

.stream-card{
  background:rgba(0,0,0,0.6);
  padding:2rem;
  border-radius:15px;
}
</style>
</head>

<body>

<canvas id="bgCanvas"></canvas>

<!-- MENU -->
<nav>
  <a href="#">Início</a>
  <a href="#planos">Planos</a>
  <a href="#stream">Streaming</a>
</nav>

<!-- PLAYER -->
<div class="player">
  <img id="capa" src="">
  <div>
    <div id="status">Carregando...</div>
    <div id="musica">🎵 ...</div>
  </div>
  <button onclick="toggleRadio()">🔇</button>
</div>

<div class="spacer"></div>

<!-- TOPO -->
<div class="topo">
  <h1>🤠 Rádio Sertaneja Premium</h1>
</div>

<!-- PLANOS -->
<section id="planos" class="plans">
  <div class="plan-card">
    <h2>Plano Iniciante</h2>
    <p>R$ 50</p>
  </div>

  <div class="plan-card">
    <h2>Plano Super</h2>
    <p>R$ 100</p>
  </div>

  <div class="plan-card">
    <h2>Plano Ouro</h2>
    <p>R$ 150</p>
  </div>
</section>

<!-- STREAM -->
<section id="stream" class="streaming-box">
  <div class="stream-card">
    🎧 Streaming ativo 24h
  </div>
</section>

<script>
let audio=new Audio("https://stm.igng.com.br:7018/stream");
audio.play();
let tocando=true;

function toggleRadio(){
  tocando?audio.pause():audio.play();
  tocando=!tocando;
}

/* MUSICA */
async function atualizarMusica(){
  let r=await fetch("http://igng.com.br/api-json/TnpBeE9BPT0rWg==");
  let d=await r.json();
  musica.innerText=d.musica||"...";
}
setInterval(atualizarMusica,5000);
atualizarMusica();

/* CANVAS FULL */
const canvas=document.getElementById("bgCanvas");
const ctx=canvas.getContext("2d");
let particles=[];
let mouse={x:0,y:0};

function resize(){
  canvas.width=window.innerWidth;
  canvas.height=window.innerHeight;
}
resize();
window.onresize=resize;

window.onmousemove=e=>{
  mouse.x=e.x;
  mouse.y=e.y;
};

for(let i=0;i<100;i++){
  particles.push({
    x:Math.random()*canvas.width,
    y:Math.random()*canvas.height,
    vx:(Math.random()-0.5),
    vy:(Math.random()-0.5),
    size:Math.random()*2
  });
}

function animate(){
  ctx.clearRect(0,0,canvas.width,canvas.height);

  particles.forEach(p=>{
    p.x+=p.vx;
    p.y+=p.vy;

    let dx=p.x-mouse.x;
    let dy=p.y-mouse.y;
    let dist=Math.sqrt(dx*dx+dy*dy);

    if(dist<150){
      p.x+=dx*0.03;
      p.y+=dy*0.03;
    }

    ctx.beginPath();
    ctx.arc(p.x,p.y,p.size,0,Math.PI*2);
    ctx.fillStyle="rgba(0,150,255,0.9)";
    ctx.fill();
  });

  requestAnimationFrame(animate);
}
animate();
</script>

</body>
</html>
