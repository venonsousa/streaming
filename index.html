<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Web Rádio Profissional</title>

<style>
body{
  margin:0;
  font-family:Arial;
  background:#000;
  color:#fff;
}

/* PLAYER TOPO */
.player{
  position:fixed;
  top:0;
  left:0;
  width:100%;
  background:#0d2b4f;
  display:flex;
  align-items:center;
  justify-content:space-between;
  padding:10px 20px;
  z-index:999;
}

.player button{
  background:#1e90ff;
  border:none;
  color:#fff;
  padding:8px 15px;
  border-radius:5px;
  cursor:pointer;
}

.player .info{
  font-size:14px;
}

.live{
  color:red;
  font-weight:bold;
}

/* ESPAÇO PRA NÃO FICAR POR BAIXO DO PLAYER */
.spacer{
  height:70px;
}

/* PIX */
.pix{
  text-align:center;
  padding:40px 20px;
}

.pix textarea{
  width:90%;
  height:100px;
}

.pix img{
  margin-top:20px;
}

/* RESTO */
.section{
  padding:40px;
  text-align:center;
}
</style>
</head>

<body>

<!-- PLAYER -->
<div class="player">
  <button onclick="toggleRadio()">▶️ Play</button>
  <div class="info">
    <span id="status">Carregando...</span><br>
    <span id="musica">---</span>
  </div>
</div>

<div class="spacer"></div>

<!-- PIX -->
<div class="pix">
  <h2>💰 Pagamento via PIX</h2>

  <textarea readonly id="pixCode">
00020101021226850014br.gov.bcb.pix2563qrcodepix.bb.com.br/pix/v2/bf62491c-2761-48e9-808e-f47e39ec6b485204000053039865406150.005802BR5925JULIO_CESAR_SUPRIANO_DE_S6015PALMEIRAS_DE_GO62070503***630445D6
  </textarea>

  <br>
  <button onclick="copiarPix()">📋 Copiar PIX</button>

  <div id="qrcode"></div>
</div>

<div class="section">
  <h2>🎧 Sua Rádio 24h Online</h2>
</div>

<script src="https://cdnjs.cloudflare.com/ajax/libs/qrcodejs/1.0.0/qrcode.min.js"></script>

<script>
let audio = new Audio("https://stm.igng.com.br:7018/stream");
let tocando = false;

function toggleRadio(){
  if(!tocando){
    audio.play();
    tocando = true;
    event.target.innerText = "⏸️ Pause";
  }else{
    audio.pause();
    tocando = false;
    event.target.innerText = "▶️ Play";
  }
}

/* GERAR QR CODE PIX */
new QRCode(document.getElementById("qrcode"), {
  text: document.getElementById("pixCode").value.trim(),
  width: 200,
  height: 200
});

/* COPIAR PIX */
function copiarPix(){
  let pix = document.getElementById("pixCode");
  pix.select();
  document.execCommand("copy");
  alert("PIX copiado!");
}

/* API RADIO (NOME DA MUSICA + AO VIVO) */
async function atualizar(){
  try{
    let res = await fetch("https://stm.igng.com.br:7018/status-json.xsl");
    let data = await res.json();

    let source = data.icestats.source;

    if(source.title){
      document.getElementById("musica").innerText = source.title;
    }

    /* AO VIVO */
    if(source.listeners > 0){
      document.getElementById("status").innerHTML = "🔴 AO VIVO";
      document.getElementById("status").classList.add("live");
    }else{
      document.getElementById("status").innerHTML = "🟢 ONLINE";
    }

  }catch(e){
    document.getElementById("status").innerText = "Offline";
  }
}

setInterval(atualizar, 5000);
atualizar();
</script>

</body>
</html>
