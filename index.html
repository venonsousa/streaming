<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Rádio Sertaneja Premium</title>

<style>
body{
  margin:0;
  font-family:Arial;
  color:#fff;
  background: url('https://xatimg.com/image/LID6lYza9A0b.png') no-repeat center center fixed;
  background-size: cover;
}

/* overlay */
body::after{
  content:"";
  position:fixed;
  top:0;
  left:0;
  width:100%;
  height:100%;
  background:rgba(0,0,0,0.65);
  z-index:-1;
}

/* PLAYER */
.player{
  position:fixed;
  top:0;
  width:100%;
  background:linear-gradient(90deg,#8B4513,#d2691e);
  display:flex;
  align-items:center;
  justify-content:space-between;
  padding:10px;
  z-index:999;
}

.player img{
  width:60px;
  height:60px;
  border-radius:10px;
  object-fit:cover;
}

.player .info{
  flex:1;
  padding:0 10px;
}

.player button{
  background:#ffcc00;
  border:none;
  padding:8px 12px;
  border-radius:8px;
  cursor:pointer;
  font-weight:bold;
}

.live{
  color:#ff3b3b;
  font-weight:bold;
}

.spacer{height:80px;}

/* TOPO */
.topo{
  text-align:center;
  padding:4rem 1rem;
  background:rgba(139,69,19,0.7);
  backdrop-filter: blur(5px);
}
</style>
</head>

<body>

<!-- PLAYER -->
<div class="player">
  <img id="capa" src="https://via.placeholder.com/60">

  <div class="info">
    <div id="status">Carregando...</div>
    <div id="musica">🎵 Carregando...</div>
  </div>

  <button onclick="toggleRadio()">🔇 Desligar</button>
</div>

<div class="spacer"></div>

<!-- TOPO -->
<div class="topo">
  <h1>🤠 Rádio Sertaneja Premium</h1>
  <p>O melhor do sertanejo 24h sem parar</p>
</div>

<script>
let audio = new Audio("https://stm.igng.com.br:7018/stream");
audio.play();
let tocando = true;

function toggleRadio(){
  if(tocando){
    audio.pause();
    tocando = false;
    event.target.innerText = "▶️ Ligar";
  }else{
    audio.play();
    tocando = true;
    event.target.innerText = "🔇 Desligar";
  }
}

/* MUSICA API */
async function atualizarMusica(){
  try{
    let r = await fetch("http://igng.com.br/api-json/TnpBeE9BPT0rWg==");
    let d = await r.json();

    let nome = d.musica || d.title || "Desconhecido";

    let artista="", musica="";

    if(nome.includes("-")){
      [artista, musica] = nome.split("-");
      musicaEl.innerHTML = `🎤 <b>${artista}</b> - ${musica}`;
    }else{
      musicaEl.innerText = nome;
      musica = nome;
    }

    buscarCapa(artista + " " + musica);

  }catch{
    musicaEl.innerText = "Erro ao carregar música";
  }
}

let musicaEl = document.getElementById("musica");

/* CAPA */
async function buscarCapa(busca){
  try{
    let r = await fetch(`https://itunes.apple.com/search?term=${encodeURIComponent(busca)}&limit=1`);
    let d = await r.json();

    if(d.results.length > 0){
      document.getElementById("capa").src = d.results[0].artworkUrl100;
    }
  }catch{}
}

/* STATUS */
async function atualizarStatus(){
  try{
    let r = await fetch("https://stm.igng.com.br:7018/status-json.xsl");
    let d = await r.json();
    let s = d.icestats.source;

    let isLive = (
      s.server_name.toLowerCase().includes("live") ||
      s.title.toLowerCase().includes("ao vivo") ||
      !s.title.includes(" - ")
    );

    let status = document.getElementById("status");

    if(isLive){
      status.innerHTML = "🔴 AO VIVO AGORA";
      status.className = "live";
    }else{
      status.innerHTML = "🎵 Tocando agora";
      status.className = "";
    }

  }catch{
    document.getElementById("status").innerText = "Offline";
  }
}

setInterval(atualizarMusica, 5000);
setInterval(atualizarStatus, 5000);

atualizarMusica();
atualizarStatus();
</script>

</body>
</html>
