<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Rádio Sertaneja Premium</title>
<meta name="description" content="Rádio Sertaneja Premium - Streaming 24h">

<link rel="icon" href="/favicon.svg">

<style>
body{
  margin:0;
  font-family:Arial;
  background:#0f0f0f;
  color:#fff;
}

/* HEADER */
header{
  position:fixed;
  top:0;
  width:100%;
  background:rgba(0,0,0,0.7);
  backdrop-filter:blur(10px);
  padding:10px 20px;
  display:flex;
  justify-content:space-between;
  align-items:center;
}

header a{
  color:#fff;
  margin:0 10px;
  text-decoration:none;
}

/* HERO */
.hero{
  height:100vh;
  display:flex;
  align-items:center;
  justify-content:center;
  text-align:center;
}

/* PLAYER */
.player{
  background:#1c1c1c;
  padding:20px;
  border-radius:12px;
}

/* PLANOS */
.planos{
  padding:80px 20px;
  text-align:center;
}

.cards{
  display:flex;
  gap:20px;
  flex-wrap:wrap;
  justify-content:center;
}

.card{
  background:#1c1c1c;
  padding:20px;
  border-radius:12px;
  width:250px;
}

button{
  width:100%;
  padding:10px;
  border:none;
  border-radius:8px;
  background:#00c853;
  color:#fff;
  cursor:pointer;
}

/* FOOTER */
footer{
  padding:20px;
  text-align:center;
  background:#111;
}
</style>

</head>

<body>

<header>
  <div>🎵 Rádio Sertaneja</div>
  <div>
    <a href="#">Início</a>
    <a href="#planos">Planos</a>
  </div>
</header>

<section class="hero">
  <div class="player">
    <h2>Ao vivo agora</h2>
    <audio controls autoplay>
      <source src="https://stm.igng.com.br:7018/stream" type="audio/mpeg">
    </audio>
  </div>
</section>

<section id="planos" class="planos">
  <h2>Planos</h2>

  <div class="cards">

    <div class="card">
      <h3>Iniciante</h3>
      <h2>R$ 50</h2>
      <p>Qualidade padrão</p>
      <button>Contratar</button>
    </div>

    <div class="card">
      <h3>Super</h3>
      <h2>R$ 100</h2>
      <p>Qualidade HD</p>
      <button>Contratar</button>
    </div>

    <div class="card">
      <h3>Ouro</h3>
      <h2>R$ 150</h2>
      <p>Sem anúncios</p>
      <button>Contratar</button>
    </div>

  </div>
</section>

<footer>
  © 2026 Rádio Sertaneja Premium
</footer>

</body>
</html>
